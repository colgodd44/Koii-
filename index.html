<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --ep-orange: #ff5f00; --case: #d8d8d8; --lcd: #111; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        .ep-case { background: var(--case); width: 340px; padding: 25px; border-radius: 15px; box-shadow: 12px 12px 0 #000; position: relative; border: 1px solid #fff; }
        
        /* LCD Screen */
        .lcd { background: var(--lcd); height: 100px; margin-bottom: 20px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--ep-orange); border: 6px solid #222; box-shadow: inset 0 0 15px #000; }
        #bpm-display { font-size: 2.5rem; font-weight: bold; }
        #bank-indicator { font-size: 0.8rem; letter-spacing: 2px; }

        /* Bank and Control Buttons */
        .top-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .bank-btn { background: #444; color: white; border: none; padding: 8px; font-size: 10px; border-radius: 3px; cursor: pointer; box-shadow: 0 3px 0 #000; }
        .bank-btn.active { background: var(--ep-orange); }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .btn-main { background: #333; color: white; border: none; padding: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; border-radius: 4px; box-shadow: 0 4px 0 #000; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .rec-active { background: #d00 !important; }

        /* The Pads */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .pad { aspect-ratio: 1/1; background: #fff; border: 1px solid #ccc; border-radius: 50%; font-size: 1.5rem; font-weight: bold; color: #333; box-shadow: 0 6px 0 #bbb; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .pad:active { transform: translateY(4px); box-shadow: 0 2px 0 #bbb; background: var(--ep-orange); color: white; }

        .tempo-input { background: none; border: none; color: var(--ep-orange); font-family: inherit; font-size: 2.5rem; width: 100px; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body>

<div class="ep-case">
    <div class="top-row">
        <button class="bank-btn active" onclick="setBank('A', this)">BANK A</button>
        <button class="bank-btn" onclick="setBank('B', this)">BANK B</button>
        <button class="bank-btn" onclick="setBank('C', this)">BANK C</button>
        <button class="bank-btn" onclick="setBank('D', this)">BANK D</button>
    </div>

    <div class="lcd">
        <div id="bank-indicator">BANK A // SAMPLE</div>
        <input type="number" id="bpm-display" class="tempo-input" value="120" onchange="updateBPM(this.value)">
        <div style="font-size: 8px;">TAP TO CHANGE BPM</div>
    </div>

    <div class="controls">
        <button class="btn-main" onclick="boot()">Power</button>
        <button class="btn-main" id="playBtn" onclick="togglePlay()">Play</button>
        <button class="btn-main" id="recBtn" onclick="toggleRec()">Rec</button>
    </div>

    <div class="grid">
        <button class="pad" onmousedown="hit(1)">1</button>
        <button class="pad" onmousedown="hit(2)">2</button>
        <button class="pad" onmousedown="hit(3)">3</button>
        <button class="pad" onmousedown="hit(4)">4</button>
        <button class="pad" onmousedown="hit(5)">5</button>
        <button class="pad" onmousedown="hit(6)">6</button>
        <button class="pad" onmousedown="hit(7)">7</button>
        <button class="pad" onmousedown="hit(8)">8</button>
        <button class="pad" onmousedown="hit(9)">9</button>
    </div>
</div>

<script>
    // Four different sound engines for Banks A, B, C, D
    const engines = {
        A: new Tone.MembraneSynth({envelope: {pitchDecay: 0.05}}).toDestination(), // Kicks
        B: new Tone.NoiseSynth({envelope: {decay: 0.1}}).toDestination(),          // Snares
        C: new Tone.MetalSynth({envelope: {decay: 0.05}}).toDestination(),         // Hats
        D: new Tone.MonoSynth({oscillator: {type: "square"}}).toDestination()      // Bass
    };

    let currentBank = 'A';
    let isRecording = false;
    let isPlaying = false;
    
    const sequence = new Tone.Part((time, event) => {
        playTrigger(event.bank, event.note, time);
    }, []).start(0);
    sequence.loop = true;
    sequence.loopEnd = "1n";

    async function boot() {
        await Tone.start();
        document.getElementById('bank-indicator').innerText = "SYSTEM ONLINE";
    }

    function setBank(bank, btn) {
        currentBank = bank;
        document.querySelectorAll('.bank-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('bank-indicator').innerText = "BANK " + bank + " // ACTIVE";
    }

    function updateBPM(val) {
        Tone.Transport.bpm.value = val;
    }

    function hit(num) {
        if (Tone.context.state !== 'running') return;
        
        playTrigger(currentBank, num);

        if (isRecording) {
            const now = Tone.Transport.seconds % Tone.Time("1n").toSeconds();
            sequence.add(now, { bank: currentBank, note: num });
        }
        if (navigator.vibrate) navigator.vibrate(10);
    }

    function playTrigger(bank, num, time = Tone.now()) {
        const freq = 50 + (num * 20); // Scale sound based on pad number
        if (bank === 'A') engines.A.triggerAttackRelease(freq, "8n", time);
        if (bank === 'B') engines.B.triggerAttackRelease("8n", time);
        if (bank === 'C') engines.C.triggerAttackRelease("32n", time);
        if (bank === 'D') engines.D.triggerAttackRelease(freq / 2, "16n", time);
    }

    function togglePlay() {
        isPlaying ? Tone.Transport.stop() : Tone.Transport.start();
        isPlaying = !isPlaying;
        document.getElementById('playBtn').style.color = isPlaying ? "#0f0" : "#fff";
    }

    function toggleRec() {
        isRecording = !isRecording;
        document.getElementById('recBtn').classList.toggle('rec-active');
    }
</script>
</body>
</html>
