<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --ep-orange: #ff5f00; --case-gray: #d1d1d1; }
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; overflow: hidden; }
        .ep-case { background: var(--case-gray); width: 320px; padding: 25px; border-radius: 20px; box-shadow: 10px 10px 0 #000; border: 2px solid #999; }
        .lcd { background: #111; height: 70px; margin-bottom: 20px; border-radius: 5px; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid #333; color: var(--ep-orange); text-shadow: 0 0 8px var(--ep-orange); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .pad { aspect-ratio: 1/1; background: #eee; border-radius: 50%; border: 1px solid #ccc; box-shadow: 0 5px 0 #bbb; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .pad:active { transform: translateY(3px); box-shadow: 0 2px 0 #999; background: var(--ep-orange); color: white; }
        .power-btn { width: 100%; padding: 10px; margin-bottom: 15px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="ep-case">
    <button class="power-btn" onclick="startEngine()">● POWER / SYSTEM START</button>
    
    <div class="lcd">
        <div id="display">EP-133 READY</div>
    </div>

    <div class="grid">
        <div class="pad" onmousedown="hit(0)">1</div>
        <div class="pad" onmousedown="hit(1)">2</div>
        <div class="pad" onmousedown="hit(2)">3</div>
        <div class="pad" onmousedown="hit(3)">4</div>
        <div class="pad" onmousedown="hit(4)">5</div>
        <div class="pad" onmousedown="hit(5)">6</div>
        <div class="pad" onmousedown="hit(6)">7</div>
        <div class="pad" onmousedown="hit(7)">8</div>
        <div class="pad" onmousedown="hit(8)">9</div>
    </div>
</div>

<script>
    // 1. Initialize Sampler (Using high-quality web drums)
    const sampler = new Tone.Sampler({
        urls: {
            "C1": "https://tonejs.github.io/audio/drum-samples/CR78/kick.mp3",
            "D1": "https://tonejs.github.io/audio/drum-samples/CR78/snare.mp3",
            "E1": "https://tonejs.github.io/audio/drum-samples/CR78/hat.mp3",
            "F1": "https://tonejs.github.io/audio/drum-samples/CR78/rim.mp3",
            "G1": "https://tonejs.github.io/audio/drum-samples/CR78/tom1.mp3",
            "A1": "https://tonejs.github.io/audio/drum-samples/CR78/tom2.mp3",
            "B1": "https://tonejs.github.io/audio/drum-samples/CR78/claps.mp3",
            "C2": "https://tonejs.github.io/audio/drum-samples/CR78/cowbell.mp3",
            "D2": "https://tonejs.github.io/audio/drum-samples/CR78/maracas.mp3"
        }
    }).toDestination();

    const notes = ["C1", "D1", "E1", "F1", "G1", "A1", "B1", "C2", "D2"];

    async function startEngine() {
        await Tone.start();
        document.getElementById('display').innerText = "001. BPM";
        document.querySelector('.power-btn').style.background = "#2ea44f";
        document.querySelector('.power-btn').innerText = "SYSTEM ONLINE";
    }

    function hit(i) {
        if (Tone.context.state !== 'running') {
            document.getElementById('display').innerText = "TAP POWER!";
            return;
        }
        sampler.triggerAttack(notes[i]);
        document.getElementById('display').innerText = "SAMP 00" + (i + 1);
        if (navigator.vibrate) navigator.vibrate(10);
    }
</script>

</body>
</html>
