<!DOCTYPE html>
<html>
<head>
    <title>KO-II DEBUG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a1a1a; color: #ff5f00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        #screen { border: 4px solid #333; padding: 20px; margin-bottom: 20px; font-size: 20px; background: #000; width: 200px; text-align: center; }
        .pad-grid { display: grid; grid-template-columns: repeat(2, 100px); gap: 20px; }
        .pad { width: 100px; height: 100px; background: #444; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #222; }
        .pad:active { transform: translateY(4px); box-shadow: 0 1px 0 #222; background: #ff5f00; }
    </style>
</head>
<body>

    <div id="screen">TAP A PAD</div>
    <div class="pad-grid">
        <button class="pad" onclick="beep(261)">1</button>
        <button class="pad" onclick="beep(329)">2</button>
        <button class="pad" onclick="beep(392)">3</button>
        <button class="pad" onclick="beep(523)">4</button>
    </div>

    <script>
        // Create the audio brain
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(frequency) {
            // 1. WAKE UP THE BRAIN (Crucial for Mobile)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 2. CREATE THE SOUND
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // That "Retro" sound
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);

            document.getElementById('screen').innerText = "FREQ: " + frequency;
        }
    </script>
</body>
</html>
