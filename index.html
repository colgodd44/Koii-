<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { 
            --ep-orange: #ff5f00; 
            --case: #e0e0e0; 
            --lcd-bg: #121212;
            --shadow: #b8b8b8;
        }
        
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }

        /* The Chassis */
        .ep-case { 
            background: var(--case); 
            width: 320px; 
            padding: 30px 20px; 
            border-radius: 12px; 
            box-shadow: 12px 12px 0 #000; 
            border: 1px solid #fff;
            position: relative;
        }

        /* Speaker Grill Detail */
        .grill { position: absolute; top: 15px; right: 25px; display: flex; gap: 3px; }
        .grill-line { width: 2px; height: 15px; background: #bbb; }

        /* The Segmented LCD */
        .lcd { 
            background: var(--lcd-bg); 
            height: 90px; 
            margin: 10px 0 25px 0; 
            border-radius: 4px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--ep-orange); 
            border: 5px solid #222;
            box-shadow: inset 0 0 10px #000;
        }
        #display { font-family: 'Courier New', monospace; font-size: 2rem; font-weight: bold; letter-spacing: 2px; }
        #sub-display { font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }

        /* Small Performance Buttons */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-sm { 
            padding: 8px; border: none; border-radius: 3px; background: #333; color: #fff; 
            font-size: 9px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 3px 0 #000;
        }
        .btn-sm:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
        .btn-active { background: #2ea44f !important; }
        .rec-active { background: #d00 !important; }

        /* The Iconic 12-Pad Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
        .pad { 
            aspect-ratio: 1/1; 
            background: #fff; 
            border-radius: 50%; 
            border: 1px solid #ccc; 
            box-shadow: 0 6px 0 var(--shadow); 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: #333;
            transition: 0.05s;
        }
        .pad:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 var(--shadow); 
            background: var(--ep-orange); 
            color: #fff; 
        }

        .label { font-size: 10px; color: #888; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="ep-case">
    <div class="grill">
        <div class="grill-line"></div><div class="grill-line"></div><div class="grill-line"></div>
    </div>

    <div class="label">EP-133 // SAMPLE TOOL</div>
    
    <div class="lcd" onclick="boot()">
        <div id="display">000</div>
        <div id="sub-display">TOUCH TO BOOT</div>
    </div>

    <div class="controls">
        <button class="btn-sm" id="playBtn" onclick="togglePlay()">Play</button>
        <button class="btn-sm" id="recBtn" onclick="toggleRec()">Rec</button>
        <button class="btn-sm" onclick="clearSequence()">Erase</button>
    </div>

    <div class="grid">
        <button class="pad" onmousedown="hit('kick')">1</button>
        <button class="pad" onmousedown="hit('snare')">2</button>
        <button class="pad" onmousedown="hit('hihat')">3</button>
        <button class="pad" onmousedown="hit('perc')">4</button>
        <button class="pad" onmousedown="hit('kick')">5</button>
        <button class="pad" onmousedown="hit('snare')">6</button>
        <button class="pad" onmousedown="hit('hihat')">7</button>
        <button class="pad" onmousedown="hit('perc')">8</button>
        <button class="pad" onmousedown="hit('kick')">9</button>
    </div>
</div>

<script>
    const kick = new Tone.MembraneSynth({ volume: 5 }).toDestination();
    const snare = new Tone.NoiseSynth({ volume: -5, envelope: { decay: 0.1 } }).toDestination();
    const hihat = new Tone.MetalSynth({ volume: -12, envelope: { decay: 0.05 } }).toDestination();
    const perc = new Tone.DuoSynth({ volume: -10 }).toDestination();

    let isRecording = false;
    let isPlaying = false;
    
    const sequence = new Tone.Part((time, event) => {
        hit(event.type, true, time);
    }, []).start(0);
    sequence.loop = true;
    sequence.loopEnd = "1n";

    async function boot() {
        await Tone.start();
        Tone.Transport.bpm.value = 120;
        document.getElementById('display').innerText = "120";
        document.getElementById('sub-display').innerText = "SYSTEM ONLINE";
    }

    function hit(type, isPlayback = false, time = Tone.now()) {
        if (Tone.context.state !== 'running') return;
        
        if (type === 'kick') kick.triggerAttackRelease("C1", "8n", time);
        if (type === 'snare') snare.triggerAttackRelease("8n", time);
        if (type === 'hihat') hihat.triggerAttackRelease("32n", time);
        if (type === 'perc') perc.triggerAttackRelease("G4", "32n", time);

        if (isRecording && !isPlayback) {
            const now = Tone.Transport.seconds % Tone.Time("1n").toSeconds();
            sequence.add(now, { type: type });
        }

        if (!isPlayback) {
            document.getElementById('display').innerText = Math.floor(Math.random()*900 + 100);
            if (navigator.vibrate) navigator.vibrate(10);
        }
    }

    function togglePlay() {
        if (isPlaying) {
            Tone.Transport.stop();
            document.getElementById('playBtn').classList.remove('btn-active');
        } else {
            Tone.Transport.start();
            document.getElementById('playBtn').classList.add('btn-active');
        }
        isPlaying = !isPlaying;
    }

    function toggleRec() {
        isRecording = !isRecording;
        document.getElementById('recBtn').classList.toggle('rec-active');
    }

    function clearSequence() {
        sequence.clear();
        document.getElementById('display').innerText = "CLR";
    }
</script>
</body>
</html>
