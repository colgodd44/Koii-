<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #1a1a1a; color: #ff5f00; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .lcd { border: 4px solid #333; padding: 20px; background: #000; margin-bottom: 20px; min-width: 200px; text-align: center; box-shadow: 0 0 15px #ff5f0033; }
        .btn { width: 200px; height: 60px; background: #ff5f00; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; cursor: pointer; }
        .btn-off { background: #444; }
    </style>
</head>
<body>

    <div class="lcd">
        <div id="status">SYSTEM OFF</div>
        <div id="state" style="font-size: 12px; margin-top: 5px; color: #666;">TAP POWER</div>
    </div>

    <button class="btn" onclick="initAudio()">1. POWER ON</button>
    <button class="btn btn-off" onclick="testSound()">2. TEST SOUND</button>

    <script>
        let audioCtx;

        function initAudio() {
            // Create or Resume the context
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            document.getElementById('status').innerText = "SYSTEM READY";
            document.getElementById('state').innerText = "STATE: " + audioCtx.state;
            document.body.style.background = "#222";
        }

        function testSound() {
            if (!audioCtx || audioCtx.state !== 'running') {
                alert("Tap POWER ON first!");
                return;
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            
            document.getElementById('status').innerText = "BEEPING...";
        }
    </script>
</body>
</html>
